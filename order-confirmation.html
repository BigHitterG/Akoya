<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmation | Akoya</title>
  <link rel="icon" type="image/png" href="assets/images/IMG_1998.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="section" style="min-height: 100vh; display: flex; align-items: center;">
    <div class="container invoice-layout">
      <div class="card">
        <div class="card-pad">
          <h2>Thank you for your order.</h2>
          <p class="body-copy" id="confirmationMessage">Your invoice should be arriving shortly.</p>
          <div class="cta-row" style="margin-top: 24px;">
            <a href="index.html" class="btn btn-primary">Home</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="main.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var message = document.getElementById('confirmationMessage');
      var params = new URLSearchParams(window.location.search);
      if (params.get('checkout') === 'success') {
        var tracking = params.get('tracking');
        if (tracking) {
          message.textContent = 'Your payment was successful, your order is confirmed, and your tracking number is ' + tracking + '.';
        } else {
          message.textContent = 'Your payment was successful and your order is confirmed.';
        }
      }
    });
  </script>
</body>
</html>
