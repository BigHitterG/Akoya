<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Akoya</title>
  <link rel="icon" type="image/png" href="assets/images/IMG_1998.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="top-banner">
    <div>Questions? Contact the Akoya Medical team and we will follow up.</div>
    <a href="index.html">Back Home</a>
  </div>

  <header>
    <div class="nav">
      <button class="hamburger" id="menuToggle" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobileMenu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="brand"><a href="index.html" aria-label="Akoya home"><img class="brand-logo" src="assets/images/IMG_1997.png" alt="Akoya"></a></div>
      <div></div>
    </div>
    <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
      <a href="buy.html">Buy</a>
      <a href="clinical-feedback.html">Clinical Feedback</a>
      <a href="our-journey.html">About Us</a>
      <a href="contact.html">Contact Us</a>
    </div>
  </header>

  <section class="section">
    <div class="container page-container">
      <div class="card">
        <div class="card-pad">
          <div class="kicker">Contact Us</div>
          <h2>Let’s talk.</h2>
          <form id="contactForm" class="invoice-form" novalidate>
            <div class="invoice-grid">
              <label>Full Name*
                <input type="text" name="fullName" required>
              </label>
              <label>Email Address*
                <input type="email" name="email" required>
              </label>
              <label>Phone Number
                <input type="tel" name="phone">
              </label>
              <label>Clinic / Organization
                <input type="text" name="organization">
              </label>
            </div>
            <label>Message*
              <textarea name="message" rows="5" required></textarea>
            </label>
            <p class="form-feedback" id="contactFeedback" aria-live="polite"></p>
            <div class="cta-row">
              <button type="submit" class="btn btn-primary">Send Message</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <footer class="section">
    <div class="container">© 2026 Akoya Medical. All rights reserved.</div>
  </footer>

  <script src="main.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('contactForm');
      const feedback = document.getElementById('contactFeedback');
      const recipients = 'tgoetz@akoyamedical.com;tgoetz.sr@akoyamedical.com;dzaun@akoyamedical.com';

      form.addEventListener('submit', (event) => {
        event.preventDefault();

        if (!form.checkValidity()) {
          feedback.textContent = 'Please complete all required fields before submitting.';
          feedback.classList.add('is-error');
          form.reportValidity();
          return;
        }

        feedback.textContent = '';
        feedback.classList.remove('is-error');

        const fullName = form.elements.fullName.value.trim();
        const email = form.elements.email.value.trim();
        const phone = form.elements.phone.value.trim() || 'N/A';
        const organization = form.elements.organization.value.trim() || 'N/A';
        const message = form.elements.message.value.trim();

        const body = [
          `Full Name: ${fullName}`,
          `Email Address: ${email}`,
          `Phone Number: ${phone}`,
          `Clinic / Organization: ${organization}`,
          '',
          'Message:',
          message
        ].join('\n');

        const subject = encodeURIComponent('Akoya Contact Form Submission');
        const encodedBody = encodeURIComponent(body);
        window.location.href = `mailto:${recipients}?subject=${subject}&body=${encodedBody}`;
      });
    });
  </script>
</body>
</html>
